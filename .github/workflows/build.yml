name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create project structure
        run: |
          mkdir -p app/src/main/java/com/example/unitwatercalc
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets
          cp AndroidManifest.xml app/src/main/AndroidManifest.xml
          cp MainActivity.kt app/src/main/java/com/example/unitwatercalc/MainActivity.kt
          cp gradle-wrapper.properties gradle/wrapper/gradle-wrapper.properties 2>/dev/null || true

      - name: Download HTML asset
        run: |
          cp index.html app/src/main/assets/index.html 2>/dev/null || echo "no index.html found"

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
